<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f23">
  <title>ふしぎ迷宮アドベンチャー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="480" height="360"></canvas>
    <div id="touch-controls">
      <button class="touch-btn" id="btn-up" aria-label="上に移動">▲</button>
      <div class="touch-row">
        <button class="touch-btn" id="btn-left" aria-label="左に移動">◀</button>
        <button class="touch-btn" id="btn-down" aria-label="下に移動">▼</button>
        <button class="touch-btn" id="btn-right" aria-label="右に移動">▶</button>
      </div>
      <div class="touch-row touch-actions">
        <button class="touch-btn touch-btn-small" id="btn-restart" aria-label="リスタート">R</button>
        <button class="touch-btn touch-btn-small" id="btn-enter" aria-label="決定">OK</button>
      </div>
    </div>
  </div>

  <!-- 縦向き時の回転案内 -->
  <div id="rotate-notice">
    <p>📱 横向きにすると遊びやすいよ！</p>
  </div>

  <script src="js/input.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/stage.js"></script>
  <script src="js/star.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
